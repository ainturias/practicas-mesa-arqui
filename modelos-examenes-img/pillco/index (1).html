  <script>
    const filterContainer = document.querySelector('.navbar-nav');
    filterContainer.addEventListener('click', (evt) => {
      evt.preventDefault();
      const option = evt.target.getAttribute('data-question') || '';
      loadQuestions(option);
    });

    function loadQuestions(option = '') {
      const container = document.querySelector('#container');
      container.innerHTML = '';

      const questionsContainer = document.querySelector('#questions').cloneNode(true);
      const selectorQuestion = option == '' ? 'div' : `.${option}`;
      const questions = questionsContainer.content.querySelectorAll(selectorQuestion);
      questions.forEach((value, index) => {
        const questionNumber = value.querySelector('span');
        if (questionNumber)
          questionNumber.textContent = `Pregunta ${index + 1}`;
        container.appendChild(value);
      });
    }

    loadQuestions();
  </script>
